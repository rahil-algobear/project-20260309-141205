<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waves of Geometry - Shader Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; padding: 2rem; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); color: white; font-family: 'Space Grotesk', -apple-system, sans-serif; z-index: 10; transition: opacity 0.5s ease; }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .controls { position: fixed; bottom: 2rem; right: 2rem; z-index: 10; display: flex; gap: 1rem; }
        button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <div class="overlay" id="overlay">
        <h1>Waves of Geometry</h1>
        <p>truchet tiling • Move mouse to interact</p>
    </div>
    <div class="controls">
        <button onclick="window.location.href='../index.html'">← Gallery</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        const isWebGL2 = !!canvas.getContext('webgl2');
        if (!gl) { alert('WebGL not supported'); throw new Error('WebGL not supported'); }

        let mouseX = 0.5, mouseY = 0.5, startTime = Date.now();

        const vertexShaderSource = isWebGL2 ? `#version 300 es
            in vec2 a_position;
            void main() { gl_Position = vec4(a_position, 0.0, 1.0); }
        ` : `attribute vec2 a_position;
            void main() { gl_Position = vec4(a_position, 0.0, 1.0); }`;

        const fragmentShaderSource = isWebGL2 ? `#version 300 es
            precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;
            out vec4 fragColor;

            const vec3 col1 = vec3(58.0, 142.0, 186.0) / 255.0;
            const vec3 col2 = vec3(196.0, 216.0, 230.0) / 255.0;
            const vec3 col3 = vec3(241.0, 243.0, 245.0) / 255.0;
            const vec3 col4 = vec3(90.0, 155.0, 138.0) / 255.0;
            const vec3 col5 = vec3(168.0, 218.0, 214.0) / 255.0;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            mat2 rot(float a) {
                float c = cos(a), s = sin(a);
                return mat2(c, -s, s, c);
            }

            float truchetPattern(vec2 p, float seed) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                
                float h = hash(i + seed);
                float angle = floor(h * 4.0) * 1.5708;
                
                f = (rot(angle) * (f - 0.5)) + 0.5;
                
                float d1 = length(f - vec2(0.0, 0.0)) - 0.5;
                float d2 = length(f - vec2(1.0, 1.0)) - 0.5;
                
                return min(abs(d1), abs(d2));
            }

            float kaleidoscope(vec2 p, float segments) {
                float angle = atan(p.y, p.x);
                float radius = length(p);
                
                float segmentAngle = 6.28318 / segments;
                angle = mod(angle, segmentAngle);
                angle = abs(angle - segmentAngle * 0.5);
                
                return angle * radius;
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                float mouseWave = length(u_mouse - 0.5) * 2.0;
                vec2 warpedUV = uv;
                warpedUV += vec2(sin(uv.y * 5.0 + u_time + mouseWave), cos(uv.x * 5.0 - u_time)) * 0.1;
                
                float kaleido = kaleidoscope(warpedUV, 6.0 + sin(u_time * 0.5) * 2.0);
                
                float scale = 8.0 + sin(u_time * 0.3) * 2.0;
                vec2 tiledUV = warpedUV * scale;
                
                float pattern1 = truchetPattern(tiledUV, u_time * 0.1);
                float pattern2 = truchetPattern(tiledUV * 0.5 + vec2(u_time * 0.05), u_time * 0.15);
                
                float combined = min(pattern1, pattern2 * 0.5);
                combined = smoothstep(0.02, 0.0, combined);
                
                float wave = sin(uv.y * 10.0 + u_time * 2.0) * 0.5 + 0.5;
                wave *= sin(uv.x * 8.0 - u_time * 1.5) * 0.5 + 0.5;
                
                vec3 col = mix(col3, col1, combined);
                col = mix(col, col2, wave * 0.3);
                col = mix(col, col4, smoothstep(0.1, 0.0, pattern1) * 0.5);
                
                float mouseInfluence = smoothstep(0.5, 0.0, length(uv - (u_mouse - 0.5) * 2.0));
                vec2 distortedUV = uv + vec2(sin(u_time * 2.0), cos(u_time * 2.0)) * mouseInfluence * 0.2;
                float mouseTile = truchetPattern(distortedUV * scale, u_time * 0.2);
                col = mix(col, col5, smoothstep(0.05, 0.0, mouseTile) * mouseInfluence);
                
                float rotation = u_time * 0.5 + kaleido;
                float rotWave = sin(rotation * 3.0) * 0.5 + 0.5;
                col += col5 * rotWave * 0.2;
                
                float vignette = 1.0 - length(uv * 0.6) * 0.4;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                fragColor = vec4(col, 1.0);
            }
        ` : `precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;

            const vec3 col1 = vec3(58.0, 142.0, 186.0) / 255.0;
            const vec3 col2 = vec3(196.0, 216.0, 230.0) / 255.0;
            const vec3 col3 = vec3(241.0, 243.0, 245.0) / 255.0;
            const vec3 col4 = vec3(90.0, 155.0, 138.0) / 255.0;
            const vec3 col5 = vec3(168.0, 218.0, 214.0) / 255.0;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            mat2 rot(float a) {
                float c = cos(a), s = sin(a);
                return mat2(c, -s, s, c);
            }

            float truchetPattern(vec2 p, float seed) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                
                float h = hash(i + seed);
                float angle = floor(h * 4.0) * 1.5708;
                
                f = (rot(angle) * (f - 0.5)) + 0.5;
                
                float d1 = length(f - vec2(0.0, 0.0)) - 0.5;
                float d2 = length(f - vec2(1.0, 1.0)) - 0.5;
                
                return min(abs(d1), abs(d2));
            }

            float kaleidoscope(vec2 p, float segments) {
                float angle = atan(p.y, p.x);
                float radius = length(p);
                
                float segmentAngle = 6.28318 / segments;
                angle = mod(angle, segmentAngle);
                angle = abs(angle - segmentAngle * 0.5);
                
                return angle * radius;
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                float mouseWave = length(u_mouse - 0.5) * 2.0;
                vec2 warpedUV = uv;
                warpedUV += vec2(sin(uv.y * 5.0 + u_time + mouseWave), cos(uv.x * 5.0 - u_time)) * 0.1;
                
                float kaleido = kaleidoscope(warpedUV, 6.0 + sin(u_time * 0.5) * 2.0);
                
                float scale = 8.0 + sin(u_time * 0.3) * 2.0;
                vec2 tiledUV = warpedUV * scale;
                
                float pattern1 = truchetPattern(tiledUV, u_time * 0.1);
                float pattern2 = truchetPattern(tiledUV * 0.5 + vec2(u_time * 0.05), u_time * 0.15);
                
                float combined = min(pattern1, pattern2 * 0.5);
                combined = smoothstep(0.02, 0.0, combined);
                
                float wave = sin(uv.y * 10.0 + u_time * 2.0) * 0.5 + 0.5;
                wave *= sin(uv.x * 8.0 - u_time * 1.5) * 0.5 + 0.5;
                
                vec3 col = mix(col3, col1, combined);
                col = mix(col, col2, wave * 0.3);
                col = mix(col, col4, smoothstep(0.1, 0.0, pattern1) * 0.5);
                
                float mouseInfluence = smoothstep(0.5, 0.0, length(uv - (u_mouse - 0.5) * 2.0));
                vec2 distortedUV = uv + vec2(sin(u_time * 2.0), cos(u_time * 2.0)) * mouseInfluence * 0.2;
                float mouseTile = truchetPattern(distortedUV * scale, u_time * 0.2);
                col = mix(col, col5, smoothstep(0.05, 0.0, mouseTile) * mouseInfluence);
                
                float rotation = u_time * 0.5 + kaleido;
                float rotWave = sin(rotation * 3.0) * 0.5 + 0.5;
                col += col5 * rotWave * 0.2;
                
                float vignette = 1.0 - length(uv * 0.6) * 0.4;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                gl_FragColor = vec4(col, 1.0);
            }`;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
        const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseUniformLocation = gl.getUniformLocation(program, 'u_mouse');
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function render() {
            const time = (Date.now() - startTime) / 1000;
            gl.useProgram(program);
            gl.uniform1f(timeUniformLocation, time);
            gl.uniform2f(resolutionUniformLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseUniformLocation, mouseX, mouseY);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionAttributeLocation);
            gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('pointermove', (e) => {
            mouseX = e.clientX / canvas.width;
            mouseY = 1.0 - (e.clientY / canvas.height);
        });

        let idleTimer;
        const overlay = document.getElementById('overlay');
        function resetIdle() {
            overlay.classList.remove('hidden');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => overlay.classList.add('hidden'), 3000);
        }
        document.addEventListener('pointermove', resetIdle);
        resetIdle();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        render();
    </script>
</body>
</html>
