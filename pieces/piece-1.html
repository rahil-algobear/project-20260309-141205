<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Reverie - Shader Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10;
            display: flex;
            gap: 1rem;
        }
        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        button:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <div class="overlay" id="overlay">
        <h1>Coral Reverie</h1>
        <p>raymarching • Move mouse to interact</p>
    </div>
    <div class="controls">
        <button onclick="window.location.href='../index.html'">← Gallery</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        const isWebGL2 = !!canvas.getContext('webgl2');

        if (!gl) {
            alert('WebGL not supported');
            throw new Error('WebGL not supported');
        }

        let mouseX = 0.5, mouseY = 0.5;
        let startTime = Date.now();

        const vertexShaderSource = isWebGL2 ? `#version 300 es
            in vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        ` : `
            attribute vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        const fragmentShaderSource = isWebGL2 ? `#version 300 es
            precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;
            out vec4 fragColor;

            const vec3 col1 = vec3(166.0, 216.0, 214.0) / 255.0;
            const vec3 col2 = vec3(255.0, 111.0, 97.0) / 255.0;
            const vec3 col3 = vec3(163.0, 193.0, 173.0) / 255.0;
            const vec3 col4 = vec3(75.0, 156.0, 211.0) / 255.0;
            const vec3 col5 = vec3(253.0, 225.0, 88.0) / 255.0;

            float hash(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
            }

            float noise(vec3 x) {
                vec3 i = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                              mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                          mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                              mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
            }

            float fbm(vec3 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for(int i = 0; i < 6; i++) {
                    value += amplitude * noise(p);
                    p *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            float sdSphere(vec3 p, float r) {
                return length(p) - r;
            }

            float sdCappedCylinder(vec3 p, float h, float r) {
                vec2 d = abs(vec2(length(p.xz), p.y)) - vec2(r, h);
                return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
            }

            float opSmoothUnion(float d1, float d2, float k) {
                float h = clamp(0.5 + 0.5 * (d2 - d1) / k, 0.0, 1.0);
                return mix(d2, d1, h) - k * h * (1.0 - h);
            }

            float sceneSDF(vec3 p) {
                vec3 q = p;
                q.y += sin(u_time * 0.5 + p.x * 2.0) * 0.3;
                q.x += cos(u_time * 0.4 + p.z * 1.5) * 0.2;
                
                float n = fbm(q * 2.0 + u_time * 0.2);
                
                float coral1 = sdCappedCylinder(q - vec3(0.5, -1.0, 0.3), 1.5, 0.3 + n * 0.2);
                float coral2 = sdCappedCylinder(q - vec3(-0.4, -1.2, -0.2), 1.3, 0.25 + n * 0.15);
                float coral3 = sdCappedCylinder(q - vec3(0.0, -0.8, 0.5), 1.0, 0.2 + n * 0.1);
                
                vec3 spherePos = vec3(sin(u_time * 0.6) * 0.5, cos(u_time * 0.5) * 0.3, 0.0);
                float sphere1 = sdSphere(q - spherePos, 0.4);
                
                float d = opSmoothUnion(coral1, coral2, 0.3);
                d = opSmoothUnion(d, coral3, 0.25);
                d = opSmoothUnion(d, sphere1, 0.4);
                
                float mouseInfluence = length(u_mouse - 0.5) * 2.0;
                d += sin(p.x * 10.0 + u_time + mouseInfluence * 5.0) * 0.02;
                d += sin(p.y * 8.0 + u_time * 1.2) * 0.02;
                
                return d;
            }

            vec3 calcNormal(vec3 p) {
                const float h = 0.0001;
                const vec2 k = vec2(1, -1);
                return normalize(k.xyy * sceneSDF(p + k.xyy * h) +
                                k.yyx * sceneSDF(p + k.yyx * h) +
                                k.yxy * sceneSDF(p + k.yxy * h) +
                                k.xxx * sceneSDF(p + k.xxx * h));
            }

            float calcAO(vec3 p, vec3 n) {
                float occ = 0.0;
                float sca = 1.0;
                for(int i = 0; i < 5; i++) {
                    float h = 0.01 + 0.12 * float(i) / 4.0;
                    float d = sceneSDF(p + h * n);
                    occ += (h - d) * sca;
                    sca *= 0.95;
                }
                return clamp(1.0 - 3.0 * occ, 0.0, 1.0);
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                vec3 ro = vec3(0.0, 0.0, 3.0);
                vec3 rd = normalize(vec3(uv, -1.0));
                
                float t = 0.0;
                vec3 col = vec3(0.0);
                
                for(int i = 0; i < 80; i++) {
                    vec3 p = ro + rd * t;
                    float d = sceneSDF(p);
                    if(d < 0.001) {
                        vec3 n = calcNormal(p);
                        float ao = calcAO(p, n);
                        
                        vec3 lightDir = normalize(vec3(1.0, 1.0, 1.0));
                        float diff = max(dot(n, lightDir), 0.0);
                        float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 32.0);
                        
                        float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);
                        
                        float pattern = fbm(p * 3.0 + u_time * 0.1);
                        vec3 baseCol = mix(col1, col2, pattern);
                        baseCol = mix(baseCol, col3, sin(p.y * 5.0 + u_time) * 0.5 + 0.5);
                        
                        float mouseEffect = smoothstep(0.5, 0.0, length(uv - (u_mouse - 0.5) * 2.0));
                        baseCol = mix(baseCol, col4, mouseEffect * 0.6);
                        
                        col = baseCol * (diff * 0.7 + 0.3) * ao;
                        col += col5 * spec * 0.5;
                        col += col4 * fresnel * 0.3;
                        break;
                    }
                    if(t > 10.0) break;
                    t += d;
                }
                
                col = mix(col, col4 * 0.3, smoothstep(0.0, 10.0, t));
                
                float vignette = 1.0 - length(uv) * 0.3;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                
                fragColor = vec4(col, 1.0);
            }
        ` : `
            precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;

            const vec3 col1 = vec3(166.0, 216.0, 214.0) / 255.0;
            const vec3 col2 = vec3(255.0, 111.0, 97.0) / 255.0;
            const vec3 col3 = vec3(163.0, 193.0, 173.0) / 255.0;
            const vec3 col4 = vec3(75.0, 156.0, 211.0) / 255.0;
            const vec3 col5 = vec3(253.0, 225.0, 88.0) / 255.0;

            float hash(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
            }

            float noise(vec3 x) {
                vec3 i = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                              mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                          mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                              mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
            }

            float fbm(vec3 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for(int i = 0; i < 6; i++) {
                    value += amplitude * noise(p);
                    p *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            float sdSphere(vec3 p, float r) {
                return length(p) - r;
            }

            float sdCappedCylinder(vec3 p, float h, float r) {
                vec2 d = abs(vec2(length(p.xz), p.y)) - vec2(r, h);
                return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
            }

            float opSmoothUnion(float d1, float d2, float k) {
                float h = clamp(0.5 + 0.5 * (d2 - d1) / k, 0.0, 1.0);
                return mix(d2, d1, h) - k * h * (1.0 - h);
            }

            float sceneSDF(vec3 p) {
                vec3 q = p;
                q.y += sin(u_time * 0.5 + p.x * 2.0) * 0.3;
                q.x += cos(u_time * 0.4 + p.z * 1.5) * 0.2;
                
                float n = fbm(q * 2.0 + u_time * 0.2);
                
                float coral1 = sdCappedCylinder(q - vec3(0.5, -1.0, 0.3), 1.5, 0.3 + n * 0.2);
                float coral2 = sdCappedCylinder(q - vec3(-0.4, -1.2, -0.2), 1.3, 0.25 + n * 0.15);
                float coral3 = sdCappedCylinder(q - vec3(0.0, -0.8, 0.5), 1.0, 0.2 + n * 0.1);
                
                vec3 spherePos = vec3(sin(u_time * 0.6) * 0.5, cos(u_time * 0.5) * 0.3, 0.0);
                float sphere1 = sdSphere(q - spherePos, 0.4);
                
                float d = opSmoothUnion(coral1, coral2, 0.3);
                d = opSmoothUnion(d, coral3, 0.25);
                d = opSmoothUnion(d, sphere1, 0.4);
                
                float mouseInfluence = length(u_mouse - 0.5) * 2.0;
                d += sin(p.x * 10.0 + u_time + mouseInfluence * 5.0) * 0.02;
                d += sin(p.y * 8.0 + u_time * 1.2) * 0.02;
                
                return d;
            }

            vec3 calcNormal(vec3 p) {
                const float h = 0.0001;
                const vec2 k = vec2(1, -1);
                return normalize(k.xyy * sceneSDF(p + k.xyy * h) +
                                k.yyx * sceneSDF(p + k.yyx * h) +
                                k.yxy * sceneSDF(p + k.yxy * h) +
                                k.xxx * sceneSDF(p + k.xxx * h));
            }

            float calcAO(vec3 p, vec3 n) {
                float occ = 0.0;
                float sca = 1.0;
                for(int i = 0; i < 5; i++) {
                    float h = 0.01 + 0.12 * float(i) / 4.0;
                    float d = sceneSDF(p + h * n);
                    occ += (h - d) * sca;
                    sca *= 0.95;
                }
                return clamp(1.0 - 3.0 * occ, 0.0, 1.0);
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                vec3 ro = vec3(0.0, 0.0, 3.0);
                vec3 rd = normalize(vec3(uv, -1.0));
                
                float t = 0.0;
                vec3 col = vec3(0.0);
                
                for(int i = 0; i < 80; i++) {
                    vec3 p = ro + rd * t;
                    float d = sceneSDF(p);
                    if(d < 0.001) {
                        vec3 n = calcNormal(p);
                        float ao = calcAO(p, n);
                        
                        vec3 lightDir = normalize(vec3(1.0, 1.0, 1.0));
                        float diff = max(dot(n, lightDir), 0.0);
                        float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 32.0);
                        
                        float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);
                        
                        float pattern = fbm(p * 3.0 + u_time * 0.1);
                        vec3 baseCol = mix(col1, col2, pattern);
                        baseCol = mix(baseCol, col3, sin(p.y * 5.0 + u_time) * 0.5 + 0.5);
                        
                        float mouseEffect = smoothstep(0.5, 0.0, length(uv - (u_mouse - 0.5) * 2.0));
                        baseCol = mix(baseCol, col4, mouseEffect * 0.6);
                        
                        col = baseCol * (diff * 0.7 + 0.3) * ao;
                        col += col5 * spec * 0.5;
                        col += col4 * fresnel * 0.3;
                        break;
                    }
                    if(t > 10.0) break;
                    t += d;
                }
                
                col = mix(col, col4 * 0.3, smoothstep(0.0, 10.0, t));
                
                float vignette = 1.0 - length(uv) * 0.3;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
        const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseUniformLocation = gl.getUniformLocation(program, 'u_mouse');

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        const positions = [-1, -1, 1, -1, -1, 1, 1, 1];
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function render() {
            const time = (Date.now() - startTime) / 1000;

            gl.useProgram(program);
            gl.uniform1f(timeUniformLocation, time);
            gl.uniform2f(resolutionUniformLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseUniformLocation, mouseX, mouseY);

            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionAttributeLocation);
            gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('pointermove', (e) => {
            mouseX = e.clientX / canvas.width;
            mouseY = 1.0 - (e.clientY / canvas.height);
        });

        let idleTimer;
        const overlay = document.getElementById('overlay');
        function resetIdle() {
            overlay.classList.remove('hidden');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => overlay.classList.add('hidden'), 3000);
        }
        document.addEventListener('pointermove', resetIdle);
        resetIdle();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        render();
    </script>
</body>
</html>
