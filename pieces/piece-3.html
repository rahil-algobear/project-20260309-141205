<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Tide Pools - Shader Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; padding: 2rem; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); color: white; font-family: 'Space Grotesk', -apple-system, sans-serif; z-index: 10; transition: opacity 0.5s ease; }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .controls { position: fixed; bottom: 2rem; right: 2rem; z-index: 10; display: flex; gap: 1rem; }
        button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <div class="overlay" id="overlay">
        <h1>Luminous Tide Pools</h1>
        <p>fbm noise • Move mouse to interact</p>
    </div>
    <div class="controls">
        <button onclick="window.location.href='../index.html'">← Gallery</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        const isWebGL2 = !!canvas.getContext('webgl2');
        if (!gl) { alert('WebGL not supported'); throw new Error('WebGL not supported'); }

        let mouseX = 0.5, mouseY = 0.5, startTime = Date.now();

        const vertexShaderSource = isWebGL2 ? `#version 300 es
            in vec2 a_position;
            void main() { gl_Position = vec4(a_position, 0.0, 1.0); }
        ` : `attribute vec2 a_position;
            void main() { gl_Position = vec4(a_position, 0.0, 1.0); }`;

        const fragmentShaderSource = isWebGL2 ? `#version 300 es
            precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;
            out vec4 fragColor;

            const vec3 col1 = vec3(27.0, 42.0, 109.0) / 255.0;
            const vec3 col2 = vec3(15.0, 60.0, 76.0) / 255.0;
            const vec3 col3 = vec3(109.0, 156.0, 190.0) / 255.0;
            const vec3 col4 = vec3(116.0, 202.0, 209.0) / 255.0;
            const vec3 col5 = vec3(231.0, 246.0, 242.0) / 255.0;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
            }

            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for(int i = 0; i < 8; i++) {
                    value += amplitude * noise(p);
                    p = p * 2.0 + vec2(0.3, 0.5);
                    amplitude *= 0.5;
                }
                return value;
            }

            vec2 curl(vec2 p) {
                const float e = 0.1;
                float n = fbm(p + vec2(0.0, e));
                float s = fbm(p - vec2(0.0, e));
                float w = fbm(p - vec2(e, 0.0));
                float ea = fbm(p + vec2(e, 0.0));
                return vec2(s - n, ea - w) / (2.0 * e);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                vec2 p = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                vec2 flow = curl(p * 2.0 + u_time * 0.1) * 0.5;
                vec2 warpedP = p + flow;
                
                float n1 = fbm(warpedP * 3.0 + u_time * 0.15);
                float n2 = fbm(warpedP * 5.0 - u_time * 0.1 + vec2(n1 * 2.0));
                float n3 = fbm(warpedP * 8.0 + u_time * 0.2 + vec2(n2 * 1.5));
                
                float pools = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
                
                float ripple = sin(length(p) * 10.0 - u_time * 2.0) * 0.5 + 0.5;
                ripple *= exp(-length(p) * 0.5);
                pools += ripple * 0.2;
                
                vec3 col = mix(col1, col2, pools);
                col = mix(col, col3, smoothstep(0.3, 0.6, pools));
                col = mix(col, col4, smoothstep(0.5, 0.8, pools));
                
                float mouseInfluence = smoothstep(0.4, 0.0, length(p - (u_mouse - 0.5) * 2.0));
                float glow = mouseInfluence * (sin(u_time * 3.0) * 0.5 + 0.5);
                col += col5 * glow * 0.8;
                col += col4 * mouseInfluence * 0.4;
                
                float biolum = smoothstep(0.7, 1.0, n3) * (sin(u_time * 4.0 + p.x * 10.0) * 0.5 + 0.5);
                col += col4 * biolum * 0.6;
                
                float edge = smoothstep(0.02, 0.0, abs(fract(pools * 5.0) - 0.5));
                col += col5 * edge * 0.3;
                
                float vignette = 1.0 - length(p * 0.6) * 0.5;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                fragColor = vec4(col, 1.0);
            }
        ` : `precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;

            const vec3 col1 = vec3(27.0, 42.0, 109.0) / 255.0;
            const vec3 col2 = vec3(15.0, 60.0, 76.0) / 255.0;
            const vec3 col3 = vec3(109.0, 156.0, 190.0) / 255.0;
            const vec3 col4 = vec3(116.0, 202.0, 209.0) / 255.0;
            const vec3 col5 = vec3(231.0, 246.0, 242.0) / 255.0;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
            }

            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for(int i = 0; i < 8; i++) {
                    value += amplitude * noise(p);
                    p = p * 2.0 + vec2(0.3, 0.5);
                    amplitude *= 0.5;
                }
                return value;
            }

            vec2 curl(vec2 p) {
                const float e = 0.1;
                float n = fbm(p + vec2(0.0, e));
                float s = fbm(p - vec2(0.0, e));
                float w = fbm(p - vec2(e, 0.0));
                float ea = fbm(p + vec2(e, 0.0));
                return vec2(s - n, ea - w) / (2.0 * e);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                vec2 p = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                vec2 flow = curl(p * 2.0 + u_time * 0.1) * 0.5;
                vec2 warpedP = p + flow;
                
                float n1 = fbm(warpedP * 3.0 + u_time * 0.15);
                float n2 = fbm(warpedP * 5.0 - u_time * 0.1 + vec2(n1 * 2.0));
                float n3 = fbm(warpedP * 8.0 + u_time * 0.2 + vec2(n2 * 1.5));
                
                float pools = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
                
                float ripple = sin(length(p) * 10.0 - u_time * 2.0) * 0.5 + 0.5;
                ripple *= exp(-length(p) * 0.5);
                pools += ripple * 0.2;
                
                vec3 col = mix(col1, col2, pools);
                col = mix(col, col3, smoothstep(0.3, 0.6, pools));
                col = mix(col, col4, smoothstep(0.5, 0.8, pools));
                
                float mouseInfluence = smoothstep(0.4, 0.0, length(p - (u_mouse - 0.5) * 2.0));
                float glow = mouseInfluence * (sin(u_time * 3.0) * 0.5 + 0.5);
                col += col5 * glow * 0.8;
                col += col4 * mouseInfluence * 0.4;
                
                float biolum = smoothstep(0.7, 1.0, n3) * (sin(u_time * 4.0 + p.x * 10.0) * 0.5 + 0.5);
                col += col4 * biolum * 0.6;
                
                float edge = smoothstep(0.02, 0.0, abs(fract(pools * 5.0) - 0.5));
                col += col5 * edge * 0.3;
                
                float vignette = 1.0 - length(p * 0.6) * 0.5;
                col *= vignette;
                
                col = pow(col, vec3(0.4545));
                gl_FragColor = vec4(col, 1.0);
            }`;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
        const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseUniformLocation = gl.getUniformLocation(program, 'u_mouse');
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function render() {
            const time = (Date.now() - startTime) / 1000;
            gl.useProgram(program);
            gl.uniform1f(timeUniformLocation, time);
            gl.uniform2f(resolutionUniformLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseUniformLocation, mouseX, mouseY);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionAttributeLocation);
            gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('pointermove', (e) => {
            mouseX = e.clientX / canvas.width;
            mouseY = 1.0 - (e.clientY / canvas.height);
        });

        let idleTimer;
        const overlay = document.getElementById('overlay');
        function resetIdle() {
            overlay.classList.remove('hidden');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => overlay.classList.add('hidden'), 3000);
        }
        document.addEventListener('pointermove', resetIdle);
        resetIdle();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        render();
    </script>
</body>
</html>
